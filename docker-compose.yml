services:
  sentinel:
    build: .
    container_name: project_sentinel
    restart: unless-stopped
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; asyncio.get_event_loop()"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab_proxy_net

networks:
  homelab_proxy_net:
    external: true
