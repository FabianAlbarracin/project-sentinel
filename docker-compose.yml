services:
  sentinel:
    build: .
    container_name: project_sentinel
    restart: unless-stopped
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab_proxy_net

networks:
  homelab_proxy_net:
    external: true
